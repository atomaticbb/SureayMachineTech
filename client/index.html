<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>Precision Industrial Blades | Sureay</title>
    <!-- meta description is managed per-page by SEO.tsx (react-helmet-async) -->
    <meta
      name="keywords"
      content="industrial blades, granulator knives, shredder blades, OEM blades, recycling blades, precision cutting blades, industrial knife manufacturer"
    />
    <!-- Preload above-the-fold hero image (homepage LCP) -->
    <link
      rel="preload"
      href="/images/hero/homehero.webp"
      as="image"
      type="image/webp"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking font load: print trick swaps media to 'all' after parse -->
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800&display=swap"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800&display=swap"
      />
    </noscript>

    <!-- Google Analytics 4 - Consent Mode v2 -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-NDTDXJNB51"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      // -- Step 1: Privacy by default - all signals denied --------------------------------
      // wait_for_update: 500 gives the async /api/region geo-check time to
      // call gtag('consent','update') before GA4 commits to the denied state.
      // Non-GDPR visitors get auto-granted within ~100-200 ms so their first
      // page_view is counted with full consent.
      gtag("consent", "default", {
        analytics_storage: "denied",
        ad_storage: "denied",
        ad_user_data: "denied",
        ad_personalization: "denied",
        wait_for_update: 500,
      });

      // -- Step 2: Restore granted consent from a previous visit ----------------------
      // Runs before React mounts so the very first page_view is tracked correctly.
      if (localStorage.getItem("sureay_cookie_v2") === "granted") {
        gtag("consent", "update", {
          analytics_storage: "granted",
          ad_storage: "granted",
          ad_user_data: "granted",
          ad_personalization: "granted",
        });
      }

      gtag("config", "G-NDTDXJNB51", { send_page_view: false });
    </script>

    <!-- Schema.org JSON-LD for Manufacturing Business -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": ["Organization", "LocalBusiness"],
        "name": "Sureay Machinery Manufacturing Co., Ltd.",
        "alternateName": "Sureay",
        "url": "https://sureay.com",
        "logo": "https://sureay.com/sureay-logo.svg",
        "foundingDate": "2008",
        "naics": "332216",
        "numberOfEmployees": {
          "@type": "QuantitativeValue",
          "value": 150
        },
        "description": "Sureay is a premier manufacturer specializing exclusively in high-performance industrial blades and precision machine knives. Engineered for maximum wear resistance, our core product line includes heavy-duty shredder blades, plastic granulator knives, and circular slitting blades designed to effortlessly process scrap metal, e-waste, paper, and rigid plastics. ISO 9001:2015 certified OEM/ODM manufacturer with global export since 2008.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Industrial Development Zone, Bowang Town, Bowang District",
          "addressLocality": "Ma'anshan City",
          "addressRegion": "Anhui Province",
          "postalCode": "243131",
          "addressCountry": "CN"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "telephone": "+86-18005550657",
          "contactType": "sales",
          "email": "lynn@sureay.com",
          "availableLanguage": ["en", "zh"]
        },
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "Industrial Blade & Machine Knife Catalog",
          "url": "https://sureay.com/products"
        },
        "sameAs": [
          "https://www.linkedin.com/in/lynn-shang-sureay",
          "https://www.youtube.com/@SureayBlades"
        ]
      }
    </script>
  </head>
